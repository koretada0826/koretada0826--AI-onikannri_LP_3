<!-- =================================================================
  公開前メモ
  ① Meta Pixel ID … 最下部コメント内 YOUR_PIXEL_ID を実IDに → コメント解除で有効化
  ② フォーム真CV … 飯田側で完了ページに Pixel + fbq('track','Lead') を設置（別途）
  ③ 助成金はFAQ形式の質問としてFAQ直後に配置（同じQ&A体裁で馴染ませる）
 ================================================================= -->

<style>
  :root{ --bg:#0a0a0c; --red:#d4001a; --red2:#ff2740; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{ background:#000; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; }

  .lp{ max-width:1080px; margin:0 auto; background:var(--bg); }
  .lp img{ display:block; width:100%; height:auto; }
  a.cta-img{ display:block; line-height:0; }

  /* FV PC/SP 出し分け（.lp img より高い優先度にする） */
  .lp img.fv-sp{ display:none; }
  @media(max-width:768px){
    .lp img.fv-pc{ display:none; }
    .lp img.fv-sp{ display:block; }
  }

  /* PR表記 */
  .pr-bar{ max-width:1080px; margin:0 auto; background:#000; color:#9aa0aa;
    font-size:11px; text-align:center; padding:7px 10px; letter-spacing:.02em; }

  /* 追従CTA（赤・aikanri調） */
  .sticky{ position:fixed; left:0; right:0; bottom:0; z-index:60; display:flex; justify-content:center;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.92) 45%); pointer-events:none; }
  .sticky a{ pointer-events:auto; width:100%; max-width:620px; }
  .btn-cta{ position:relative; display:block; overflow:hidden; text-align:center; text-decoration:none;
    color:#fff; font-weight:900; font-size:18px; letter-spacing:.08em;
    padding:18px 48px 18px 16px; border-radius:12px;
    background:linear-gradient(180deg,#ff2b44 0%,#d4001a 55%,#a60014 100%);
    border:1px solid #ff6577;
    box-shadow:0 10px 26px rgba(180,0,20,.45), inset 0 1px 0 rgba(255,255,255,.35), inset 0 -3px 8px rgba(90,0,10,.5); }
  .btn-cta small{ display:block; font-weight:700; font-size:11.5px; letter-spacing:.02em; margin-top:3px; color:#ffd9de; }
  .btn-cta .arw{ position:absolute; right:14px; top:50%; transform:translateY(-50%);
    width:30px; height:30px; border-radius:50%; background:#000; color:#ff5168;
    border:1px solid #ff6577; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; }
  .btn-cta::before{ content:""; position:absolute; top:0; left:-45%; width:34%; height:100%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.4), transparent);
    transform:skewX(-22deg); animation:sheen 5s ease-in-out infinite; pointer-events:none; }
  @keyframes sheen{ 0%{left:-45%} 55%,100%{left:130%} }

  /* 埋め込みフォーム（スマホ＝縦1列。高さはフォーム実寸に合わせ空白を出さない） */
  #form{ max-width:1080px; margin:0 auto; background:#fff; }
  #form .fh{ background:#000; color:#fff; text-align:center; padding:24px 16px 18px; border-top:3px solid var(--red); }
  #form .fh .ey{ color:var(--red2); font-size:12px; letter-spacing:.16em; font-weight:800; }
  #form .fh h2{ font-size:24px; font-weight:900; margin-top:8px; }
  #form .fh p{ font-size:12.5px; color:#cfcfd4; margin-top:8px; }
  #form iframe{ width:100%; min-height:2780px; border:0; display:block; background:#fff; }

  footer{ max-width:1080px; margin:0 auto; background:#000; color:#7d828c;
    font-size:11px; line-height:1.7; text-align:center; padding:22px 16px 100px; }

  /* ===== PC（≥1080px）＝本家と同じ2カラム：左LP／右フォーム固定 ===== */
  @media(min-width:1080px){
    .shell{ display:flex; align-items:flex-start; max-width:1540px; margin:0 auto; }
    .lp{ flex:1 1 auto; min-width:0; max-width:1080px; margin:0; }
    /* 右カラム＝フォームを画面の高さに固定し、中身は内部スクロール（=空白ゼロ・はみ出しゼロ） */
    #form{ flex:0 0 460px; max-width:none; margin:0;
      position:sticky; top:0; height:100vh; display:flex; flex-direction:column; }
    #form .fh{ display:none; }                         /* フォーム自身に見出しがあるのでPCでは隠す */
    #form iframe{ flex:1 1 auto; height:auto; min-height:0; }
    .sticky{ display:none; }                           /* PCは常時フォームが見えるので追従CTA不要 */
    footer{ max-width:1540px; }
  }
</style>
</head>

<script>
  // 開いたら必ず先頭から
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0,0);
  window.addEventListener('load', function(){ window.scrollTo(0,0); });

  // 埋め込みフォームの高さ調整（小さく始めて実寸を取得、±8px未満は無視して増殖防止）
  (function(){
    var cur = 0;
    window.addEventListener('message', function(e){
      var d = e.data || {};
      if (d.type !== 'genai-form-height' || !d.height) return;
      if (Math.abs(d.height - cur) > 8){ cur = d.height; var f=document.getElementById('genai-iframe'); if(f) f.style.height = d.height + 'px'; }
    });
  })();

  // CTAクリック計測
  document.querySelectorAll('a[data-cta]').forEach(function(a){
    a.addEventListener('click', function(){ if(window.fbq){ fbq('trackCustom','CTAClick',{source:a.dataset.cta||'cta'}); } });
  });
</script>
